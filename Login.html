<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <img id="logo" src="Medilocator.svg">
    <div id="box">
        <h2>Hello.</h2>
        <p id="welcome">Welcome back!</p>
        <form onsubmit="event.preventDefault(); processData()">
            <div class="formGrp">
                <p style="text-align: left;">Email</p>
                <input type="text" id="emailIn" placeholder="✉ Enter email" style="text-align: left;" required>
            </div>
            <div class="formGrp">
                <p style="text-align: left;">Password</p>
                <input type="password" id="passIn" placeholder="🔒︎ Enter password" style="text-align: left;" required>
            </div>
            <a id="forgor" href="" style="text-align: right;" padding="20px" font-weight="bolder" color="atlantic";>Forgot password?</a>
            <button type="submit">Log in</button>
            <div id="noAcc">
                <p>Don't have an account? <a href="">Sign in</a> </p> 
            </div>
            
        </form>


    </div>
    <script>
        
    </script>
</body>
</html>
