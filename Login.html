<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #welcome{
            color: rgb(122, 122, 122);
        }
        #box{
            width: 50%;
            box-shadow:  0 5px 15px rgba(0,0,0,0.15);
            background-color: rgb(255, 255, 255);
            margin: auto;
            border-radius: 12px;
            padding: 20px;
            margin-top: 100px;
            font-size: 20px;
            line-height: 0.5;
        }
        #box form {
            margin-top: 60px;
        }
        #box form p {
            font-size: 16px;
        }

        .formGrp {
            line-height: 1px;
        }
        #box form div {
            margin-top: 30px;
        }
        .formGrp input {
            background-color: rgba(209, 207, 207, 0.327);
            border: 0px;
            padding: 10px;
            border-radius: 10px;
            width: 9%;
        }

    </style>
</head>
<body>
    
    <div id="box">
        <h2>Hello.</h2>
        <p id="welcome">Welcome Back</p>
        <form >
            <div class="formGrp">
            <p>Email</p>
            <input type="text" id="emailIn" placeholder="Enter email" required>
            </div>
            <div class="formGrp">
                <p>Password</p>
                <input type="text" id="passIn" placeholder="Enter password" required>
            </div>
        </form>


    </div>
</body>
</html>
